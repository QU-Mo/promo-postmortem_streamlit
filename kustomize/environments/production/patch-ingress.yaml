apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: promo-postmortem-streamlit
spec:
  tls:
    - hosts:
        - ${PROD_HOST}
      secretName: ${PROD_TLS_SECRET}
  rules:
    - host: ${PROD_HOST}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: promo-postmortem-streamlit
                port:
                  number: 80
