apiVersion: apps/v1
kind: Deployment
metadata:
  name: promo-postmortem-streamlit
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: promo-postmortem-streamlit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: promo-postmortem-streamlit
    spec:
      containers:
        - name: streamlit
          image: ${IMAGE_URI}:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
              name: http
          env:
            - name: PORT
              value: "8501"
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
